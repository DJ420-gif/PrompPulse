name: 🗺️ Auto Regenerate Sitemap + Ping Google

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Scan all HTML files and rebuild sitemap
        run: |
          BASE="https://dj420-gif.github.io/PromptPulse"
          TODAY=$(date +"%Y-%m-%d")
          OUTPUT="sitemap.xml"

          echo '<?xml version="1.0" encoding="UTF-8"?>' > $OUTPUT
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> $OUTPUT

          # Find every HTML file and add to sitemap
          find . -name "*.html" \
            ! -path "./.git/*" \
            ! -path "./node_modules/*" \
            | sort \
            | while read file; do
              # Remove leading ./
              CLEAN="${file#./}"
              URL="$BASE/$CLEAN"

              # Set priority based on file location
              if [[ "$CLEAN" == "index.html" ]]; then
                PRIORITY="1.0"
                FREQ="weekly"
              elif [[ "$CLEAN" == *"ai-tools"* ]]; then
                PRIORITY="0.9"
                FREQ="weekly"
              elif [[ "$CLEAN" == *"blog"* ]] || [[ "$CLEAN" == *"Blog"* ]]; then
                PRIORITY="0.8"
                FREQ="weekly"
              elif [[ "$CLEAN" == *"review"* ]]; then
                PRIORITY="0.8"
                FREQ="monthly"
              else
                PRIORITY="0.7"
                FREQ="monthly"
              fi

              echo "  <url>" >> $OUTPUT
              echo "    <loc>$URL</loc>" >> $OUTPUT
              echo "    <lastmod>$TODAY</lastmod>" >> $OUTPUT
              echo "    <changefreq>$FREQ</changefreq>" >> $OUTPUT
              echo "    <priority>$PRIORITY</priority>" >> $OUTPUT
              echo "  </url>" >> $OUTPUT
            done

          echo '</urlset>' >> $OUTPUT
          echo "✅ Sitemap built with $(grep -c '<url>' $OUTPUT) URLs"
          cat $OUTPUT

      - name: Ping Google to crawl sitemap
        run: |
          SITEMAP_URL="https://dj420-gif.github.io/PromptPulse/sitemap.xml"
          echo "📡 Pinging Google..."
          curl -s "https://www.google.com/ping?sitemap=$SITEMAP_URL" -o /dev/null -w "Google response: %{http_code}\n" || echo "Ping sent"
          echo "📡 Pinging Bing..."
          curl -s "https://www.bing.com/ping?sitemap=$SITEMAP_URL" -o /dev/null -w "Bing response: %{http_code}\n" || echo "Ping sent"
          echo "✅ Search engines notified"

      - name: Commit updated sitemap
        run: |
          git config user.name "PromptPulse Bot"
          git config user.email "actions@github.com"
          git add sitemap.xml
          git diff --staged --quiet || git commit -m "🗺️ Auto rebuild sitemap — $(date +'%Y-%m-%d') — $(grep -c '<url>' sitemap.xml) URLs"
          git push
