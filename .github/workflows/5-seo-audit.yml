name: 🔍 SEO Audit — Check Every Page

on:
  push:
    branches: [main]
    paths:
      - '**.html'
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:

jobs:
  seo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run full SEO audit on all HTML files
        run: |
          REPORT="seo-audit-report.txt"
          ISSUES=0
          PAGES=0
          PERFECT=0

          echo "🔍 PromptPulse SEO Audit Report" > $REPORT
          echo "Generated: $(date)" >> $REPORT
          echo "========================================" >> $REPORT
          echo "" >> $REPORT

          find . -name "*.html" ! -path "./.git/*" | sort | while read file; do
            FILENAME=$(basename $file)
            PAGE_ISSUES=0

            # ── CHECK 1: Title tag ──────────────────
            TITLE=$(grep -oP '(?<=<title>)[^<]+' "$file" 2>/dev/null | head -1)
            if [ -z "$TITLE" ]; then
              echo "❌ MISSING TITLE: $FILENAME" >> $REPORT
              PAGE_ISSUES=$((PAGE_ISSUES+1))
            elif [ ${#TITLE} -gt 65 ]; then
              echo "⚠️  TITLE TOO LONG (${#TITLE} chars): $FILENAME" >> $REPORT
              echo "   → $TITLE" >> $REPORT
              PAGE_ISSUES=$((PAGE_ISSUES+1))
            elif [ ${#TITLE} -lt 30 ]; then
              echo "⚠️  TITLE TOO SHORT (${#TITLE} chars): $FILENAME" >> $REPORT
              PAGE_ISSUES=$((PAGE_ISSUES+1))
            fi

            # ── CHECK 2: Meta description ───────────
            DESC=$(grep -oP '(?<=name="description" content=")[^"]+' "$file" 2>/dev/null | head -1)
            if [ -z "$DESC" ]; then
              echo "❌ MISSING META DESCRIPTION: $FILENAME" >> $REPORT
              PAGE_ISSUES=$((PAGE_ISSUES+1))
            elif [ ${#DESC} -gt 160 ]; then
              echo "⚠️  DESCRIPTION TOO LONG (${#DESC} chars): $FILENAME" >> $REPORT
              PAGE_ISSUES=$((PAGE_ISSUES+1))
            elif [ ${#DESC} -lt 100 ]; then
              echo "⚠️  DESCRIPTION TOO SHORT (${#DESC} chars): $FILENAME" >> $REPORT
              PAGE_ISSUES=$((PAGE_ISSUES+1))
            fi

            # ── CHECK 3: H1 tag ─────────────────────
            H1=$(grep -oP '(?<=<h1[^>]*>)[^<]+' "$file" 2>/dev/null | head -1)
            if [ -z "$H1" ]; then
              H1_COUNT=$(grep -c '<h1' "$file" 2>/dev/null || echo "0")
              if [ "$H1_COUNT" -eq 0 ]; then
                echo "❌ MISSING H1 TAG: $FILENAME" >> $REPORT
                PAGE_ISSUES=$((PAGE_ISSUES+1))
              fi
            fi

            # ── CHECK 4: Canonical URL ───────────────
            CANONICAL=$(grep -c 'rel="canonical"' "$file" 2>/dev/null || echo "0")
            if [ "$CANONICAL" -eq 0 ]; then
              echo "⚠️  MISSING CANONICAL: $FILENAME" >> $REPORT
              PAGE_ISSUES=$((PAGE_ISSUES+1))
            fi

            # ── CHECK 5: OG Tags ─────────────────────
            OG_TITLE=$(grep -c 'og:title' "$file" 2>/dev/null || echo "0")
            if [ "$OG_TITLE" -eq 0 ]; then
              echo "⚠️  MISSING OG:TITLE: $FILENAME" >> $REPORT
              PAGE_ISSUES=$((PAGE_ISSUES+1))
            fi

            # ── CHECK 6: Schema markup ───────────────
            SCHEMA=$(grep -c 'application/ld+json' "$file" 2>/dev/null || echo "0")
            if [ "$SCHEMA" -eq 0 ]; then
              echo "⚠️  MISSING SCHEMA MARKUP: $FILENAME" >> $REPORT
              PAGE_ISSUES=$((PAGE_ISSUES+1))
            fi

            # ── CHECK 7: Meta keywords ───────────────
            KEYWORDS=$(grep -c 'name="keywords"' "$file" 2>/dev/null || echo "0")
            if [ "$KEYWORDS" -eq 0 ]; then
              echo "⚠️  MISSING META KEYWORDS: $FILENAME" >> $REPORT
              PAGE_ISSUES=$((PAGE_ISSUES+1))
            fi

            # ── CHECK 8: Robots meta ─────────────────
            ROBOTS=$(grep -c 'name="robots"' "$file" 2>/dev/null || echo "0")
            if [ "$ROBOTS" -eq 0 ]; then
              echo "⚠️  MISSING ROBOTS META: $FILENAME" >> $REPORT
              PAGE_ISSUES=$((PAGE_ISSUES+1))
            fi

            # ── CHECK 9: Author meta ─────────────────
            AUTHOR=$(grep -c 'name="author"' "$file" 2>/dev/null || echo "0")
            if [ "$AUTHOR" -eq 0 ]; then
              echo "⚠️  MISSING AUTHOR META: $FILENAME" >> $REPORT
              PAGE_ISSUES=$((PAGE_ISSUES+1))
            fi

            # ── CHECK 10: Viewport meta ──────────────
            VIEWPORT=$(grep -c 'name="viewport"' "$file" 2>/dev/null || echo "0")
            if [ "$VIEWPORT" -eq 0 ]; then
              echo "❌ MISSING VIEWPORT (mobile broken!): $FILENAME" >> $REPORT
              PAGE_ISSUES=$((PAGE_ISSUES+1))
            fi

            if [ "$PAGE_ISSUES" -eq 0 ]; then
              echo "✅ PERFECT: $FILENAME" >> $REPORT
            else
              echo "   → $PAGE_ISSUES issue(s) found in $FILENAME" >> $REPORT
            fi

            echo "" >> $REPORT
          done

          echo "" >> $REPORT
          echo "========================================" >> $REPORT
          echo "SEO Audit Complete — $(date)" >> $REPORT
          echo "Fix all ❌ CRITICAL issues first" >> $REPORT
          echo "Then address ⚠️  warnings" >> $REPORT

          cat $REPORT

      - name: Count total issues
        run: |
          if [ -f seo-audit-report.txt ]; then
            CRITICAL=$(grep -c "❌" seo-audit-report.txt || echo "0")
            WARNINGS=$(grep -c "⚠️" seo-audit-report.txt || echo "0")
            PERFECT=$(grep -c "✅ PERFECT" seo-audit-report.txt || echo "0")
            echo ""
            echo "================================"
            echo "📊 SEO AUDIT SUMMARY"
            echo "================================"
            echo "✅ Perfect pages:  $PERFECT"
            echo "⚠️  Warnings:       $WARNINGS"
            echo "❌ Critical issues: $CRITICAL"
            echo "================================"
          fi

      - name: Upload SEO audit report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: seo-audit-report-$(date +'%Y-%m-%d')
          path: seo-audit-report.txt
          retention-days: 90
